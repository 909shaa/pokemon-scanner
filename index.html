<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Pokémon Card Scanner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#07080f;color:#eeeef5;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px 16px 40px;display:flex;flex-direction:column;align-items:center;}
  h1{font-size:24px;font-weight:900;margin:0;}
  button{font-family:inherit;cursor:pointer;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scanline{0%,100%{top:0}50%{top:calc(100% - 2px)}}
  .fade{animation:fadein .3s ease both;}
  #app{width:100%;max-width:440px;}
  .panel{background:#141520;border:1px solid #1e2035;border-radius:16px;padding:16px;}
  .btn-primary{width:100%;padding:16px;border-radius:13px;border:1px solid #f5c518;background:#f5c51815;color:#f5c518;font-size:15px;font-weight:800;letter-spacing:.3px;}
  .btn-secondary{width:100%;padding:14px;border-radius:13px;border:1px solid #1e2035;background:none;color:#8888aa;font-size:13px;font-weight:600;}
  .btn-ghost{background:none;border:none;color:#8888aa;font-size:13px;text-align:center;width:100%;padding:8px;}
  .stack{display:flex;flex-direction:column;gap:12px;}
  .badge{font-size:10px;font-weight:700;letter-spacing:.8px;border-radius:4px;padding:2px 7px;white-space:nowrap;}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
</style>
</head>
<body>

<!-- HEADER -->
<div style="text-align:center;margin-bottom:24px;">
  <div style="font-size:11px;letter-spacing:3px;color:#f5c518;font-weight:700;margin-bottom:4px;">POKÉMON TCG</div>
  <h1>Card Value Scanner</h1>
</div>

<div id="app"></div>

<!-- hidden canvas for capture -->
<canvas id="cvs" style="display:none"></canvas>

<script>
const ANTHROPIC_API_KEY = ""; // ← YOU WILL PASTE YOUR KEY HERE

const C = {
  bg:"#07080f",surface:"#0f1018",panel:"#141520",border:"#1e2035",
  accent:"#f5c518",green:"#3ecf8e",red:"#f05252",blue:"#4f8ef7",
  text:"#eeeef5",sub:"#8888aa",muted:"#44445a"
};

const RARITY_COLOR = {
  "Common":"#8888aa","Uncommon":"#3ecf8e","Rare":"#4f8ef7",
  "Holo Rare":"#c084fc","Ultra Rare":"#f97316","Secret Rare":"#f5c518"
};

const QUALITY_TIPS = {
  too_dark:  {icon:"💡", text:"Move to brighter light or turn on a lamp directly above the card."},
  too_blurry:{icon:"🔍", text:"Hold your phone steady and tap the card to focus before scanning."},
  glare:     {icon:"☁️", text:"Avoid direct light on the card surface — angle it slightly or use indirect lighting."},
  angle:     {icon:"📐", text:"Hold the camera directly above the card, parallel to the surface."},
  partial:   {icon:"🃏", text:"Make sure the entire card is visible — no edges cut off."},
  background:{icon:"🖤", text:"Place the card on a plain dark surface so the edges are clearly visible."},
};

let stream = null;
let imageUrl = null;
let imageB64 = null;

const app = document.getElementById("app");
const cvs = document.getElementById("cvs");

function fmt(n){return n!=null?`$${Number(n).toFixed(2)}`:"—";}

function badge(label, color){
  return `<span class="badge" style="color:${color};background:${color}22;border:1px solid ${color}44;">${label}</span>`;
}

function stopCamera(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
}

// ── SCREENS ──────────────────────────────────────────────────────

function showIdle(){
  stopCamera();
  app.innerHTML=`<div class="stack fade">
    <button class="btn-primary" onclick="showCamera()">📷  Use Camera</button>
    <button class="btn-secondary" onclick="document.getElementById('fu').click()">📁  Upload a photo instead</button>
    <input id="fu" type="file" accept="image/*" style="display:none" onchange="handleUpload(event)"/>
    <div class="panel" style="margin-top:4px;">
      <p style="font-size:11px;color:${C.muted};letter-spacing:1px;font-weight:700;margin-bottom:10px;">FOR BEST RESULTS</p>
      ${[["💡","Bright, even light — no harsh shadows"],["🖤","Plain dark background behind the card"],
         ["📐","Camera directly above, card fills the frame"],["🔍","Tap to focus before scanning"]]
        .map(([i,t])=>`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;">
          <span style="font-size:16px;">${i}</span>
          <span style="font-size:13px;color:${C.sub};line-height:1.4;">${t}</span></div>`).join("")}
    </div>
  </div>`;
}

async function showCamera(){
  app.innerHTML=`<div class="stack fade">
    <div id="vf-wrap" style="position:relative;border-radius:16px;overflow:hidden;background:#000;">
      <video id="vid" playsinline muted style="width:100%;display:block;max-height:360px;object-fit:cover;"></video>
      <div id="overlay" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
        <div style="position:absolute;inset:0;background:#00000066;"></div>
        <div id="frame" style="position:relative;z-index:1;width:58%;aspect-ratio:63/88;border:2px solid ${C.muted};border-radius:10px;box-shadow:0 0 0 9999px #00000066;transition:border-color .4s,box-shadow .4s;">
          ${['0%,0%','100%,0%','0%,100%','100%,100%'].map((pos,i)=>{
            const [l,t]=pos.split(',');
            const br = i%2===0?`border-right:2px solid ${C.accent};`:`border-left:2px solid ${C.accent};`;
            const bt = i<2?`border-bottom:2px solid ${C.accent};`:`border-top:2px solid ${C.accent};`;
            const tx = i%2===0?'translateX(-50%)':'translateX(50%)';
            const ty = i<2?'translateY(-50%)':'translateY(50%)';
            return `<div style="position:absolute;left:${l};top:${t};width:12px;height:12px;${br}${bt}transform:${tx} ${ty};"></div>`;
          }).join('')}
        </div>
      </div>
      <div style="position:absolute;bottom:14px;left:0;right:0;text-align:center;pointer-events:none;">
        <span id="guide" style="font-size:12px;color:#ffffffcc;background:#00000088;padding:4px 12px;border-radius:99px;">Starting camera…</span>
      </div>
    </div>
    <div style="display:flex;justify-content:center;">
      <button id="shutter" onclick="capture()" style="width:68px;height:68px;border-radius:50%;background:${C.accent};border:4px solid #ffffff33;font-size:22px;box-shadow:0 0 20px ${C.accent}66;display:flex;align-items:center;justify-content:center;">📸</button>
    </div>
    <button class="btn-ghost" onclick="showIdle()">Cancel</button>
  </div>`;

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment",width:{ideal:1280},height:{ideal:960}},audio:false
    });
    const vid = document.getElementById("vid");
    vid.srcObject = stream;
    vid.onloadedmetadata = ()=>{
      vid.play();
      const frame = document.getElementById("frame");
      if(frame){frame.style.borderColor=C.accent;frame.style.boxShadow=`0 0 0 9999px #00000066,0 0 20px ${C.accent}55`;}
      const guide = document.getElementById("guide");
      if(guide) guide.textContent = "Fit the card inside the frame";
    };
  }catch(e){
    app.innerHTML=`<div class="stack fade">
      <div class="panel" style="text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">📷</div>
        <p style="color:${C.red};font-size:13px;">Camera access denied. Use the upload option below.</p>
      </div>
      <button class="btn-secondary" onclick="document.getElementById('fu2').click()">📁 Upload a photo</button>
      <input id="fu2" type="file" accept="image/*" style="display:none" onchange="handleUpload(event)"/>
      <button class="btn-ghost" onclick="showIdle()">← Back</button>
    </div>`;
  }
}

function capture(){
  const vid = document.getElementById("vid");
  if(!vid||!vid.videoWidth) return;
  cvs.width=vid.videoWidth; cvs.height=vid.videoHeight;
  cvs.getContext("2d").drawImage(vid,0,0);
  const url = cvs.toDataURL("image/jpeg",0.92);
  imageUrl = url;
  imageB64 = url.split(",")[1];
  stopCamera();
  showScanning();
  runScan();
}

function handleUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    imageUrl = ev.target.result;
    imageB64 = imageUrl.split(",")[1];
    showScanning();
    runScan();
  };
  reader.readAsDataURL(file);
}

function showScanning(){
  app.innerHTML=`<div class="stack fade" style="align-items:center;padding:32px 0;">
    ${imageUrl?`<div style="position:relative;width:110px;">
      <img src="${imageUrl}" style="width:110px;height:154px;object-fit:cover;border-radius:10px;border:1px solid ${C.border};filter:brightness(.65);">
      <div id="scanline" style="position:absolute;top:0;left:0;right:0;height:2px;background:${C.accent};box-shadow:0 0 10px ${C.accent};animation:scanline 1.4s ease-in-out infinite;"></div>
    </div>`:""}
    <div style="text-align:center;">
      <div style="width:32px;height:32px;border-radius:50%;border:3px solid ${C.border};border-top:3px solid ${C.accent};animation:spin .8s linear infinite;margin:0 auto 12px;"></div>
      <p id="status" style="color:${C.accent};font-weight:700;font-size:15px;">Reading card details…</p>
    </div>
  </div>`;
}

async function runScan(){
  const steps=["Reading card details…","Checking set & rarity…","Looking up market data…","Calculating value…"];
  let si=0;
  const tick=setInterval(()=>{
    si=Math.min(si+1,steps.length-1);
    const el=document.getElementById("status");
    if(el) el.textContent=steps[si];
  },900);

  const prompt=`You are a Pokémon TCG expert. Analyze this card image.

First assess image quality. If the card cannot be reliably identified, return quality_issue as one of: too_dark, too_blurry, glare, angle, partial, background. Otherwise set it to "ok".

Return ONLY valid JSON (no markdown, no extra text):
{
  "quality_issue":"ok|too_dark|too_blurry|glare|angle|partial|background",
  "is_pokemon_card":true,
  "name":"Pokémon name",
  "card_name":"Full card name e.g. Charizard VMAX",
  "set":"Set name",
  "set_number":"e.g. 020/189",
  "rarity":"Common|Uncommon|Rare|Holo Rare|Ultra Rare|Secret Rare",
  "condition":"Near Mint|Lightly Played|Moderately Played|Heavily Played",
  "condition_notes":"brief note",
  "is_first_edition":false,
  "is_shadowless":false,
  "is_graded":false,
  "grade_company":null,
  "grade_score":null,
  "price_low":0,
  "price_mid":0,
  "price_high":0,
  "price_confidence":"Low|Medium|High",
  "sell_tip":"one sharp sentence on how to sell this card"
}`;

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:1000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageB64}},
          {type:"text",text:prompt}
        ]}]
      })
    });
    clearInterval(tick);
    const data=await res.json();
    const text=data.content?.map(b=>b.text||"").join("")||"";
    const clean=text.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(clean);
    if(parsed.quality_issue&&parsed.quality_issue!=="ok"){showTips(parsed.quality_issue);return;}
    showResult(parsed);
  }catch(e){
    clearInterval(tick);
    showTips("too_blurry");
  }
}

function showTips(issue){
  const tip = QUALITY_TIPS[issue]||QUALITY_TIPS.too_blurry;
  const others = Object.entries(QUALITY_TIPS).filter(([k])=>k!==issue).map(([,v])=>
    `<div style="display:flex;gap:10px;align-items:flex-start;">
      <span style="font-size:14px;">${v.icon}</span>
      <span style="font-size:12px;color:${C.muted};line-height:1.4;">${v.text}</span>
    </div>`).join("");

  app.innerHTML=`<div class="stack fade">
    ${imageUrl?`<img src="${imageUrl}" style="width:100%;max-height:200px;object-fit:contain;border-radius:12px;border:1px solid ${C.border};filter:brightness(.6) saturate(.5);">`:""}
    <div class="panel" style="border-color:${C.red}44;">
      <p style="font-weight:700;font-size:14px;color:${C.red};margin-bottom:8px;">⚠ Couldn't read the card clearly</p>
      <p style="font-size:13px;color:${C.sub};margin-bottom:12px;line-height:1.5;">Here's how to get a better scan:</p>
      <div style="display:flex;gap:10px;align-items:flex-start;background:#f5c51812;border:1px solid ${C.accent}33;border-radius:10px;padding:11px 14px;margin-bottom:14px;">
        <span style="font-size:18px;">${tip.icon}</span>
        <p style="font-size:13px;color:${C.accent};line-height:1.5;">${tip.text}</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">${others}</div>
    </div>
    <button class="btn-primary" onclick="showCamera()">Try Again with Camera</button>
    <button class="btn-secondary" onclick="document.getElementById('fu3').click()">Upload a Different Photo</button>
    <input id="fu3" type="file" accept="image/*" style="display:none" onchange="handleUpload(event)"/>
  </div>`;
}

function showResult(r){
  const condColor={"Near Mint":C.green,"Lightly Played":"#8bc34a","Moderately Played":"#f97316","Heavily Played":C.red}[r.condition]||C.sub;
  const confColor={"High":C.green,"Medium":C.accent,"Low":C.red}[r.price_confidence]||C.sub;
  const rarColor=RARITY_COLOR[r.rarity]||C.sub;
  const max=(r.price_high||0)*1.15||1;
  const pct=v=>Math.min(100,((v||0)/max)*100).toFixed(1)+"%";
  const rangW=(((r.price_high||0)-(r.price_low||0))/max*100).toFixed(1)+"%";

  const badges=[
    r.rarity?badge(r.rarity,rarColor):"",
    r.is_first_edition?badge("1st Edition",C.accent):"",
    r.is_shadowless?badge("Shadowless","#c084fc"):"",
    r.is_graded&&r.grade_company?badge(`${r.grade_company} ${r.grade_score}`,C.green):""
  ].filter(Boolean).join("");

  const gradeNudge=(!r.is_graded&&(r.price_mid||0)>=40&&r.condition==="Near Mint")
    ?`<div style="background:#c084fc12;border:1px solid #c084fc33;border-radius:14px;padding:14px;font-size:13px;color:#c084fc;line-height:1.5;">
        💎 This card may be worth getting graded — a PSA 10 could push the value significantly higher.
      </div>`:""

  app.innerHTML=`<div class="stack fade">
    <!-- identity -->
    <div style="background:${C.panel};border:1px solid ${C.border};border-radius:16px;overflow:hidden;display:flex;">
      ${imageUrl?`<img src="${imageUrl}" style="width:88px;flex-shrink:0;object-fit:cover;border-right:1px solid ${C.border};">`:""}
      <div style="padding:14px 16px;flex:1;">
        <div style="font-size:11px;color:${C.muted};margin-bottom:4px;">${r.set||"Unknown Set"}${r.set_number?" · "+r.set_number:""}</div>
        <div style="font-size:19px;font-weight:900;line-height:1.1;margin-bottom:8px;">${r.card_name||r.name||"Unknown Card"}</div>
        <div class="row">${badges}</div>
      </div>
    </div>
    <!-- price -->
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;">
        <span style="font-size:11px;color:${C.muted};letter-spacing:1px;">ESTIMATED VALUE</span>
        <span class="badge" style="color:${confColor};background:${confColor}22;border:1px solid ${confColor}44;">${r.price_confidence} confidence</span>
      </div>
      <div style="font-size:44px;font-weight:900;color:${C.accent};letter-spacing:-1px;line-height:1.1;">${fmt(r.price_mid)}</div>
      <div style="font-size:12px;color:${C.sub};margin-bottom:14px;">market average</div>
      <!-- range bar -->
      <div style="position:relative;height:6px;background:${C.border};border-radius:99px;">
        <div style="position:absolute;left:${pct(r.price_low)};width:${rangW};height:100%;background:linear-gradient(90deg,${C.green}88,${C.accent}88);border-radius:99px;"></div>
        <div style="position:absolute;left:${pct(r.price_mid)};transform:translate(-50%,-4px);width:14px;height:14px;border-radius:50%;background:${C.accent};border:2px solid ${C.bg};box-shadow:0 0 8px ${C.accent};"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;">
        <span style="color:${C.sub};">${fmt(r.price_low)} <span style="color:${C.muted};">low</span></span>
        <span style="color:${C.accent};font-weight:800;">${fmt(r.price_mid)} avg</span>
        <span style="color:${C.sub};">${fmt(r.price_high)} <span style="color:${C.muted};">high</span></span>
      </div>
    </div>
    <!-- condition -->
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:11px;color:${C.muted};letter-spacing:1px;">CONDITION</span>
        <span style="font-size:12px;font-weight:700;color:${condColor};">${r.condition||"Unknown"}</span>
      </div>
      ${r.condition_notes?`<p style="font-size:13px;color:${C.sub};line-height:1.5;">${r.condition_notes}</p>`:""}
    </div>
    ${r.sell_tip?`<div style="background:${C.accent}10;border:1px solid ${C.accent}33;border-radius:14px;padding:14px;font-size:13px;color:${C.accent};line-height:1.6;">💰 ${r.sell_tip}</div>`:""}
    ${gradeNudge}
    <p style="font-size:11px;color:${C.muted};text-align:center;line-height:1.5;">Estimates are AI-based. Verify on eBay Sold Listings or TCGPlayer before selling.</p>
    <button class="btn-secondary" onclick="showIdle()">Scan Another Card</button>
  </div>`;
}

// ── INIT ─────────────────────────────────────────────────────────
if(!ANTHROPIC_API_KEY){
  app.innerHTML=`<div class="panel fade" style="text-align:center;">
    <div style="font-size:32px;margin-bottom:12px;">🔑</div>
    <p style="color:${C.accent};font-weight:700;font-size:15px;margin-bottom:8px;">API Key Required</p>
    <p style="color:${C.sub};font-size:13px;line-height:1.6;">Open <code style="color:${C.accent};">index.html</code> in a text editor and paste your Anthropic API key into the <code style="color:${C.accent};">ANTHROPIC_API_KEY</code> variable at the top of the script.</p>
  </div>`;
}else{
  showIdle();
}
</script>
</body>
</html>
